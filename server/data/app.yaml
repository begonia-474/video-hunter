# Default f2 configuration for the GUI server.
# This file is used as a fallback when the f2 installation is not found.

douyin:
  cookie:
  mode: post
  naming: '{create}_{desc}'
  path: Download
  interval: all
  timeout: 10
  max_retries: 5
  lyric: yes
  max_connections: 5
  max_counts: 0
  max_tasks: 10
  page_counts: 20
  skip_existing: false

tiktok:
  cookie:
  mode: post
  naming: '{create}_{desc}'
  path: Download
  interval: all
  timeout: 10
  max_retries: 5
  max_connections: 5
  max_counts: 0
  max_tasks: 5
  page_counts: 5
  skip_existing: false

twitter:
  path: Download
  folderize: yes
  mode: one
  naming: '{create}_{desc}'
  cookie:
  interval: all
  timeout: 10
  max_retries: 5
  max_connections: 5
  max_counts: 0
  max_tasks: 5
  page_counts: 20
  skip_existing: false

weibo:
  path: Download
  folderize: yes
  mode: post
  naming: '{create}_{desc}'
  cookie:
  interval: all
  timeout: 10
  max_retries: 5
  max_connections: 5
  max_counts: 0
  max_tasks: 5
  page_counts: 20
  skip_existing: false

bark:
  enable_bark: false
  key:
  token:
  mode: get
  sound: birdsong
  volume: 5
  group: F2下载统计
  url: "https://f2.wiki/"
  retry: 3
  ringtones: 1
  icon: https://f2.wiki/f2-logo-with-shadow.png
  level: active
